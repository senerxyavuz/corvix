# Corvix Web - Nginx Sunucu Konfigürasyonu

server {
    # 80 portunu dinle
    listen 80;
    listen [::]:80;

    # Sunucu adı (Coolify bu ayarı override edebilir)
    server_name corvix.com.tr www.corvix.com.tr localhost;

    # Web dosyalarının bulunduğu dizin
    root /usr/share/nginx/html;

    # Varsayılan dosya
    index index.html;

    # Gzip sıkıştırma - sayfa hızını artırır
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 256;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Statik dosyalar için önbellek ayarları
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Ana route - tüm istekleri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404 sayfası
    error_page 404 /index.html;
}
